<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Recommend</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f8f8; color: #111; min-height: 100vh; }
  header { background: #fff; border-bottom: 1px solid #e8e8e8; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  header span { font-size: 13px; color: #888; }
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
  .sidebar { display: flex; flex-direction: column; gap: 16px; }
  .card { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 20px; }
  .card h2 { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500; }
  input[type="text"], textarea { width: 100%; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; font-size: 14px; color: #111; background: #fafafa; outline: none; transition: border 0.2s; }
  input[type="text"]:focus, textarea:focus { border-color: #111; background: #fff; }
  textarea { resize: none; height: 80px; }
  .upload-area { border: 1.5px dashed #ddd; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: #fafafa; }
  .upload-area:hover { border-color: #999; background: #f0f0f0; }
  .upload-area p { font-size: 13px; color: #888; margin-top: 6px; }
  .upload-area .icon { font-size: 24px; }
  #preview-img { width: 100%; border-radius: 8px; margin-top: 12px; display: none; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-top: 1px solid #f0f0f0; }
  .toggle-row span { font-size: 14px; color: #333; }
  .toggle-row small { font-size: 12px; color: #aaa; display: block; }
  .toggle { position: relative; width: 44px; height: 24px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: #ddd; border-radius: 24px; cursor: pointer; transition: 0.2s; }
  .slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: 0.2s; }
  input:checked + .slider { background: #111; }
  input:checked + .slider:before { transform: translateX(20px); }
  .btn { width: 100%; padding: 13px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn:hover { background: #333; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .results-area { min-height: 400px; }
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .results-header h2 { font-size: 18px; font-weight: 600; }
  .results-header span { font-size: 13px; color: #888; }
  .enriched-query { font-size: 12px; color: #888; margin-bottom: 16px; background: #f5f5f5; border-radius: 8px; padding: 10px 14px; }
  .enriched-query strong { color: #555; }
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
  .product-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; overflow: hidden; transition: transform 0.2s; }
  .product-card:hover { transform: translateY(-2px); }
  .product-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #f0f0f0; }
  .product-card .no-img { width: 100%; aspect-ratio: 3/4; background: #f5f5f5; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 13px; }
  .product-card .info { padding: 12px; }
  .product-card .rank { font-size: 11px; font-weight: 700; color: #888; letter-spacing: 0.5px; margin-bottom: 4px; }
  .product-card .name { font-size: 14px; font-weight: 600; color: #111; margin-bottom: 4px; line-height: 1.3; }
  .product-card .meta { font-size: 12px; color: #aaa; margin-bottom: 6px; }
  .product-card .desc { font-size: 11px; color: #888; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .score-box { padding: 8px 12px 10px; border-top: 1px solid #f0f0f0; display: flex; flex-direction: column; gap: 5px; }
  .score-row { display: flex; align-items: center; justify-content: space-between; }
  .score-label { font-size: 11px; color: #aaa; }
  .score-bar-wrap { flex: 1; margin: 0 8px; height: 4px; background: #f0f0f0; border-radius: 2px; }
  .score-bar { height: 4px; border-radius: 2px; background: #111; }
  .score-val { font-size: 11px; color: #555; font-weight: 600; min-width: 36px; text-align: right; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; color: #ccc; }
  .empty-state .big { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 16px; }
  .spinner { width: 36px; height: 36px; border: 3px solid #f0f0f0; border-top-color: #111; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 14px; color: #888; }
  .badge-rerank { display: inline-block; background: #111; color: #fff; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 4px; margin-left: 8px; letter-spacing: 0.3px; }
  .badge-sasrec { display: inline-block; background: #4a6cf7; color: #fff; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 4px; margin-left: 8px; letter-spacing: 0.3px; }
  .error { background: #fff3f3; border: 1px solid #fcc; border-radius: 8px; padding: 16px; color: #c00; font-size: 14px; }
  .related-section { margin-top: 32px; }
  .related-section .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .related-section .section-title span { font-size: 12px; color: #888; font-weight: 400; }
</style>
</head>
<body>

<header>
  <h1>Fashion Recommend</h1>
  <span>H&M Personalized Fashion System</span>
</header>

<div class="container">
  <div class="sidebar">

    <div class="card">
      <h2>유저 정보</h2>
      <label>유저 ID</label>
      <input type="text" id="customer-id" placeholder="고객 ID 입력..." value="00000dbacae5abe5e23885899a1fa44253a17956c6d1c3d25f88aa139fdfc657">
    </div>

    <div class="card">
      <h2>검색 조건</h2>
      <label>자연어 쿼리</label>
      <textarea id="query" placeholder="예: 요즘 유행하는 서울 날씨에 맞는 코트, 내일 강남 야외 미팅에 입을 옷..."></textarea>

      <div style="margin-top: 16px;">
        <label>참고 이미지 (선택)</label>
        <div class="upload-area" onclick="document.getElementById('img-input').click()">
          <div class="icon">+</div>
          <p>클릭하여 이미지 업로드</p>
        </div>
        <input type="file" id="img-input" accept="image/*" style="display:none" onchange="previewImage(this)">
        <img id="preview-img" alt="preview">
      </div>
    </div>

    <div class="card">
      <h2>옵션</h2>
      <div class="toggle-row">
        <div>
          <span>Reranking</span>
          <small>VL 모델이 이미지 기반으로 재정렬 (약 8초)</small>
        </div>
        <label class="toggle">
          <input type="checkbox" id="use-rerank">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <button class="btn" onclick="recommend()">추천받기</button>

  </div>

  <div class="results-area">
    <div id="results-container">
      <div class="empty-state">
        <div class="big">&#128248;</div>
        <p>검색 조건을 입력하고 추천받기를 클릭하세요</p>
      </div>
    </div>
    <div id="related-container"></div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';

function previewImage(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('preview-img');
    img.src = e.target.result;
    img.style.display = 'block';
  };
  reader.readAsDataURL(input.files[0]);
}

async function recommend() {
  const customerId = document.getElementById('customer-id').value.trim();
  const query      = document.getElementById('query').value.trim();
  const useRerank  = document.getElementById('use-rerank').checked;
  const imgInput   = document.getElementById('img-input');

  if (!customerId) { alert('유저 ID를 입력해주세요.'); return; }
  if (!query && !imgInput.files[0]) { alert('텍스트 쿼리 또는 이미지를 입력해주세요.'); return; }

  const btn = document.querySelector('.btn');
  btn.disabled = true;

  const container        = document.getElementById('results-container');
  const relatedContainer = document.getElementById('related-container');

  container.innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p>${useRerank ? 'Reranking 중... (약 8초 소요)' : '추천 결과를 불러오는 중...'}</p>
    </div>
  `;
  relatedContainer.innerHTML = '';

  try {
    // 메인 추천
    const formData = new FormData();
    formData.append('customer_id', customerId);
    if (query) formData.append('natural_query', query);
    formData.append('use_rerank', useRerank);
    if (imgInput.files[0]) formData.append('image', imgInput.files[0]);

    const res = await fetch(`${API}/recommend`, { method: 'POST', body: formData });
    if (!res.ok) throw new Error(`서버 오류: ${res.status}`);
    const data = await res.json();
    renderResults(data.results, useRerank);

    // SASRec 연관 추천 (비동기로 따로 호출)
    const relatedFormData = new FormData();
    relatedFormData.append('customer_id', customerId);
    const relatedRes = await fetch(`${API}/recommend/related`, { method: 'POST', body: relatedFormData });
    if (relatedRes.ok) {
      const relatedData = await relatedRes.json();
      renderRelated(relatedData.results);
    }

  } catch (e) {
    container.innerHTML = `<div class="error">오류: ${e.message}<br>서버가 실행 중인지 확인해주세요.</div>`;
  } finally {
    btn.disabled = false;
  }
}

function scoreBar(label, value, maxVal) {
  const pct = maxVal > 0 ? Math.min((value / maxVal) * 100, 100) : 0;
  return `
    <div class="score-row">
      <span class="score-label">${label}</span>
      <div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%"></div></div>
      <span class="score-val">${value.toFixed(4)}</span>
    </div>
  `;
}

function renderResults(results, useRerank) {
  const container = document.getElementById('results-container');
  if (!results || results.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="big">&#128533;</div><p>추천 결과가 없습니다.</p></div>';
    return;
  }

  const badge = useRerank ? '<span class="badge-rerank">Reranked</span>' : '';

  const enrichedQuery = results[0]?.enriched_query;
  const enrichedHtml  = enrichedQuery
    ? `<div class="enriched-query"><strong>보강된 쿼리:</strong> ${enrichedQuery}</div>`
    : '';

  const scoreKey1 = useRerank ? 'rerank_score' : 'emb_score';
  const max1      = Math.max(...results.map(r => r.scores?.[scoreKey1] ?? 0));
  const maxBpr    = Math.max(...results.map(r => r.scores?.bpr_score ?? 0));

  let html = `
    <div class="results-header">
      <h2>추천 결과 ${badge}</h2>
      <span>${results.length}개 아이템</span>
    </div>
    ${enrichedHtml}
    <div class="product-grid">
  `;

  results.forEach((item, i) => {
    const imgSrc = `${API}/image/${item.article_id}`;
    const s      = item.scores || {};

    const scoreHtml = useRerank
      ? `<div class="score-box">
           ${scoreBar('Rerank', s.rerank_score ?? 0, max1)}
           ${scoreBar('BPR',    s.bpr_score    ?? 0, maxBpr)}
         </div>`
      : `<div class="score-box">
           ${scoreBar('Emb', s.emb_score ?? 0, max1)}
           ${scoreBar('BPR', s.bpr_score ?? 0, maxBpr)}
         </div>`;

    const descHtml = item.description
      ? `<div class="desc">${item.description}</div>`
      : '';

    html += `
      <div class="product-card">
        <img src="${imgSrc}" alt="${item.prod_name}"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="no-img" style="display:none;">이미지 없음</div>
        <div class="info">
          <div class="rank"># ${i + 1}</div>
          <div class="name">${item.prod_name}</div>
          <div class="meta">${item.product_type || ''} · ${item.colour || ''}</div>
          ${descHtml}
        </div>
        ${scoreHtml}
      </div>
    `;
  });

  html += '</div>';
  container.innerHTML = html;
}

function renderRelated(results) {
  const container = document.getElementById('related-container');
  if (!results || results.length === 0) return;

  let html = `
    <div class="related-section">
      <div class="section-title">
        이런 것도 어떠세요?
        <span class="badge-sasrec">SASRec</span>
        <span>구매 시퀀스 기반 다음 추천</span>
      </div>
      <div class="product-grid">
  `;

  results.forEach((item, i) => {
    const imgSrc = `${API}/image/${item.article_id}`;
    html += `
      <div class="product-card">
        <img src="${imgSrc}" alt="${item.prod_name}"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="no-img" style="display:none;">이미지 없음</div>
        <div class="info">
          <div class="rank"># ${i + 1}</div>
          <div class="name">${item.prod_name}</div>
          <div class="meta">${item.product_type || ''} · ${item.colour || ''}</div>
        </div>
      </div>
    `;
  });

  html += '</div></div>';
  container.innerHTML = html;
}
</script>
</body>
</html>
